<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Office Dugout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pinstripe { background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; }
        .score-font { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">
    <div id="app">
        </div>

    <script>
        // Simple State Management
        let currentUser = 'ANDREA';
        let lastUpdated = '7:42 PM';

        const themes = {
            ANDREA: { name: "Andrea's Dugout", team: "Brewers", color: "bg-[#13294B]", accent: "bg-[#FFC52F]", state: "Wisconsin", farm: "Nashville Sounds (AAA)" },
            CJ: { name: "CJ's Dugout", team: "Cubs", color: "bg-[#0E3386]", accent: "bg-[#CC3433]", state: "Illinois", farm: "Iowa Cubs (AAA)" }
        };

        function render() {
            const theme = themes[currentUser];
            const html = `
                <header class="${theme.color} text-white p-4 sticky top-0 shadow-lg">
                    <div class="flex justify-between items-center max-w-md mx-auto">
                        <div>
                            <h1 class="font-black italic uppercase tracking-tighter">${theme.name}</h1>
                            <p class="text-[10px] opacity-70">Live Feed • ${lastUpdated}</p>
                        </div>
                        <div class="flex bg-black/30 rounded-full p-1 text-[10px] font-bold">
                            <button onclick="switchUser('CJ')" class="px-3 py-1 rounded-full ${currentUser === 'CJ' ? theme.accent : ''}">CJ</button>
                            <button onclick="switchUser('ANDREA')" class="px-3 py-1 rounded-full ${currentUser === 'ANDREA' ? theme.accent : ''}">ANDREA</button>
                        </div>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-4 space-y-6">
                    <section class="bg-white rounded-2xl shadow-md overflow-hidden border-b-4 border-gray-300">
                        <div class="p-3 border-b flex justify-between items-center">
                            <span class="text-red-600 font-bold text-xs uppercase italic">● Live Scoreboard</span>
                            <button onclick="refresh()" class="bg-gray-100 text-[10px] font-black px-2 py-1 rounded border border-gray-300">UPDATE LIVE SCORE</button>
                        </div>
                        <div class="p-8 flex justify-around items-center pinstripe">
                            <div class="text-center">
                                <div class="text-5xl score-font">5</div>
                                <div class="text-[9px] font-bold text-gray-500 uppercase">${theme.team}</div>
                            </div>
                            <div class="text-gray-400 text-2xl font-light italic">vs</div>
                            <div class="text-center text-gray-300">
                                <div class="text-5xl score-font">2</div>
                                <div class="text-[9px] font-bold uppercase">Opponent</div>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white rounded-xl p-4 shadow-sm border-l-8 ${theme.accent.replace('bg-', 'border-')}">
                        <h3 class="font-black text-xs uppercase mb-2">🗞️ ${theme.state} Side-Piece</h3>
                        <p class="text-sm font-medium italic">"Local community garden wins award for best sunflowers!"</p>
                        <div class="mt-3 flex gap-2 border-t pt-2">
                            <button class="text-lg">👍</button><button class="text-lg">👎</button><button class="text-lg">😊</button><button class="text-lg">☹️</button>
                        </div>
                    </section>

                    <div class="bg-gray-800 text-white rounded-xl p-4">
                        <p class="text-[9px] uppercase font-bold text-gray-400">Farm System (AAA)</p>
                        <p class="font-bold uppercase">${theme.farm}</p>
                    </div>
                </main>
            `;
            document.getElementById('app').innerHTML = html;
        }

        window.switchUser = (user) => { currentUser = user; render(); };
        window.refresh = () => { 
            lastUpdated = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            render(); 
        };

        render();
    </script>
</body>
</html>
